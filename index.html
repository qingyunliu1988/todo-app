<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>My Todo List</h1>

    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="Add a new task..."
        autocomplete="off"
      />
      <button id="add-btn">Add</button>
    </div>

    <ul id="task-list"></ul>

    <p id="empty-hint">No tasks yet. Add one above!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
