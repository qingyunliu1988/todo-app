<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的待办清单</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="clock" id="clock"></div>
    <h1 class="title">✦ 我的待办清单</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="添加新任务..." />
      <select id="prioritySelect">
        <option value="high">🔴 紧急</option>
        <option value="medium" selected>🟡 普通</option>
        <option value="low">🟢 轻松</option>
      </select>
      <button id="addBtn">添加</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="high">🔴 紧急</button>
      <button class="filter-btn" data-filter="medium">🟡 普通</button>
      <button class="filter-btn" data-filter="low">🟢 轻松</button>
      <button class="filter-btn" data-filter="done">✔ 已完成</button>
    </div>
    <ul id="taskList"></ul>
    <p class="empty-msg" id="emptyMsg">暂无任务，添加一个吧！</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
